<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Mini Target Shooter</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #121212;
            font-family: 'Arial Black', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #ui-panel {
            display: flex;
            gap: 30px;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 2px 2px #ff4500;
        }
        #game-container {
            width: 800px;
            height: 500px;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            border: 4px solid #ff4500;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
        }
        .target {
            width: 60px;
            height: 60px;
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            transition: transform 0.1s ease;
            animation: float 1s infinite alternate;
        }
        .target:active {
            transform: scale(0.8);
        }
        /* Different target styles */
        .player-target { background: #ffcc00; border: 3px solid #fff; }
        .airdrop-target { background: #ff3333; border: 3px solid #000; box-shadow: 0 0 10px #ff3333; }
        
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        h1 {
            color: #ff4500;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 3px 3px #000;
        }
        button {
            padding: 15px 40px;
            font-size: 22px;
            font-family: inherit;
            background-color: #ff4500;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 5px #b33000;
            transition: 0.1s;
        }
        button:active {
            box-shadow: 0 2px #b33000;
            transform: translateY(3px);
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div>SCORE: <span id="score">0</span></div>
        <div>TIME: <span id="timer">30</span>s</div>
    </div>

    <div id="game-container">
        <!-- Game Over Screen -->
        <div id="game-over-screen">
            <h1 id="title-text">FREE FIRE MINI GAME</h1>
            <p id="final-score-text" style="font-size: 20px; display: none; margin-bottom: 20px;"></p>
            <button id="start-btn" onclick="startGame()">BOOYAH! START</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const titleText = document.getElementById('title-text');
        const finalScoreText = document.getElementById('final-score-text');

        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let targetInterval;
        let isPlaying = false;

        function startGame() {
            // Reset Variables
            score = 0;
            timeLeft = 30;
            isPlaying = true;
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            
            // Hide Menu Screen
            gameOverScreen.style.display = 'none';

            // Clear any old targets left over
            document.querySelectorAll('.target').forEach(t => t.remove());

            // Timers
            gameInterval = setInterval(updateTimer, 1000);
            targetInterval = setInterval(spawnTarget, 700); // spawn a target every 0.7 seconds
        }

        function updateTimer() {
            timeLeft--;
            timerDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function spawnTarget() {
            if (!isPlaying) return;

            const target = document.createElement('div');
            target.classList.add('target');

            // Randomly pick target type (Airdrop or Character)
            const isAirdrop = Math.random() > 0.5;
            if (isAirdrop) {
                target.classList.add('airdrop-target');
                target.innerHTML = '📦'; // Airdrop crate emoji
                target.dataset.points = 20;
            } else {
                target.classList.add('player-target');
                target.innerHTML = '🏃'; // Enemy runner emoji
                target.dataset.points = 10;
            }

            // Random position within the game box
            const x = Math.random() * (gameContainer.clientWidth - 70);
            const y = Math.random() * (gameContainer.clientHeight - 70);
            
            target.style.left = `${x}px`;
            target.style.top = `${y}px`;

            // When target clicked
            target.addEventListener('mousedown', (e) => {
                score += parseInt(target.dataset.points);
                scoreDisplay.textContent = score;
                target.remove();
                e.stopPropagation(); 
            });

            gameContainer.appendChild(target);

            // Target disappears on its own after 1.2 seconds if not hit
            setTimeout(() => {
                if (target.parentNode) {
                    target.remove();
                }
            }, 1200);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(targetInterval);

            // Show Game Over Screen
            titleText.textContent = "GAME OVER!";
            finalScoreText.textContent = `You scored ${score} points! Total Booyah!`;
            finalScoreText.style.display = 'block';
            startBtn.textContent = "PLAY AGAIN";
            gameOverScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
