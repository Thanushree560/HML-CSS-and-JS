<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors - 2 Player</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎮 Rock Paper Scissors</h1>

    <div class="scoreboard">

        <div class="card">
            <h2>Player 1</h2>
            <h3 id="score1">0</h3>
        </div>

        <div class="card">
            <h2>Player 2</h2>
            <h3 id="score2">0</h3>
        </div>

    </div>

    <div id="turnBox">

        <h2 id="turnText">
            Player 1's Turn
        </h2>

        <p id="info">
            Select your move
        </p>

    </div>

    <div class="choices">

        <button class="choice" data-choice="rock">
            ✊
            <span>Rock</span>
        </button>

        <button class="choice" data-choice="paper">
            ✋
            <span>Paper</span>
        </button>

        <button class="choice" data-choice="scissors">
            ✌️
            <span>Scissors</span>
        </button>

    </div>

    <div class="result">

        <h2 id="winner">
            Waiting...
        </h2>

        <p id="moves">
            Player 1 : -
            <br>
            Player 2 : -
        </p>

    </div>

    <div class="buttons">

        <button id="playAgain">
            Play Again
        </button>

        <button id="reset">
            Reset Score
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
