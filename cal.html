<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Calendar</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .calendar {
        background: white;
        padding: 20px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header button {
        background: #4facfe;
        border: none;
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
    }

    .header h2 {
        margin: 0;
    }

    .days, .dates {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        text-align: center;
        margin-top: 10px;
    }

    .days div {
        font-weight: bold;
        color: #555;
    }

    .dates div {
        padding: 10px;
        margin: 3px;
        border-radius: 6px;
        cursor: pointer;
    }

    .dates div:hover {
        background: #e0f7ff;
    }

    .today {
        background: #4facfe;
        color: white;
    }

    .note-popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border-radius: 10px;
        display: none;
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .note-popup textarea {
        width: 100%;
        height: 80px;
        margin-top: 10px;
    }

    .note-popup button {
        margin-top: 10px;
        padding: 8px;
        border: none;
        background: #4facfe;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="calendar">
    <div class="header">
        <button onclick="changeMonth(-1)">⬅️</button>
        <h2 id="monthYear"></h2>
        <button onclick="changeMonth(1)">➡️</button>
    </div>

    <div class="days">
        <div>Sun</div><div>Mon</div><div>Tue</div>
        <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div class="dates" id="dates"></div>
</div>

<div class="note-popup" id="popup">
    <h3 id="selectedDate"></h3>
    <textarea id="noteText" placeholder="Write your note..."></textarea>
    <button onclick="saveNote()">Save</button>
</div>

<script>
let currentDate = new Date();
let selectedDateKey = "";

function renderCalendar() {
    const monthYear = document.getElementById("monthYear");
    const datesContainer = document.getElementById("dates");

    datesContainer.innerHTML = "";

    let year = currentDate.getFullYear();
    let month = currentDate.getMonth();

    let firstDay = new Date(year, month, 1).getDay();
    let lastDate = new Date(year, month + 1, 0).getDate();

    monthYear.innerText = currentDate.toLocaleString("default", {
        month: "long",
        year: "numeric"
    });

    for (let i = 0; i < firstDay; i++) {
        datesContainer.innerHTML += "<div></div>";
    }

    for (let i = 1; i <= lastDate; i++) {
        let dateDiv = document.createElement("div");
        dateDiv.innerText = i;

        let today = new Date();
        if (
            i === today.getDate() &&
            month === today.getMonth() &&
            year === today.getFullYear()
        ) {
            dateDiv.classList.add("today");
        }

        dateDiv.onclick = () => openPopup(year, month, i);
        datesContainer.appendChild(dateDiv);
    }
}

function changeMonth(direction) {
    currentDate.setMonth(currentDate.getMonth() + direction);
    renderCalendar();
}

function openPopup(year, month, day) {
    const popup = document.getElementById("popup");
    const noteText = document.getElementById("noteText");

    selectedDateKey = `${year}-${month}-${day}`;
    document.getElementById("selectedDate").innerText = `${day}/${month+1}/${year}`;

    noteText.value = localStorage.getItem(selectedDateKey) || "";
    popup.style.display = "block";
}

function saveNote() {
    const noteText = document.getElementById("noteText").value;
    localStorage.setItem(selectedDateKey, noteText);
    document.getElementById("popup").style.display = "none";
}

window.onclick = function(e) {
    const popup = document.getElementById("popup");
    if (e.target === popup) {
        popup.style.display = "none";
    }
};

renderCalendar();
</script>

</body>
</html>
